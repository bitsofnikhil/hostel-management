# Server
server.port=${PORT:8080}

# Local H2 by default. Render/PostgreSQL overrides these with env variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/hosteldb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:hostelManagementSecretKeyForJWTTokenGenerationThatShouldBeChangedInProduction}
app.jwt.expiration=${JWT_EXPIRATION:31536000000}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
