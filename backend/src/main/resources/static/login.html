<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login – Hostel Management System</title>
    <link rel="stylesheet" href="/css/style.css">

    <meta name="theme-color" content="#10156f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Hostel Mgmt">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
<div class="login-page">
    <div class="login-card auth-card-wide">
        <div class="login-logo">
            <div class="icon">🏠</div>
            <h1>Hostel Management</h1>
            <p id="authSubtitle">Create the first account, then use the same login on laptop or phone.</p>
        </div>

        <div class="auth-tabs">
            <button type="button" class="auth-tab active" id="loginTab" onclick="showLogin()">Login</button>
            <button type="button" class="auth-tab" id="registerTab" onclick="showRegister()">Create Account</button>
        </div>

        <div id="authAlert" class="alert alert-danger" style="display:none"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" autocomplete="username" required>
                <div class="error-message" id="loginUsernameError"></div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" autocomplete="current-password" required>
                <div class="error-message" id="loginPasswordError"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span>🔐 Sign In</span>
            </button>
        </form>

        <form id="registerForm" style="display:none" novalidate>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Warden / Supervisor name" autocomplete="name" required>
                <div class="error-message" id="fullNameError"></div>
            </div>
            <div class="form-group">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" class="form-control" placeholder="Create username" autocomplete="username" required>
                <div class="error-message" id="registerUsernameError"></div>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="Minimum 6 characters" autocomplete="new-password" required>
                <div class="error-message" id="registerPasswordError"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                <span>👤 Create Account</span>
            </button>
            <p class="auth-note">
                First created account becomes ADMIN. Later accounts become SUPERVISOR by default.
            </p>
        </form>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    Auth.redirectIfLoggedIn();

    const alertBox = document.getElementById('authAlert');

    function clearAuthErrors() {
        alertBox.style.display = 'none';
        alertBox.className = 'alert alert-danger';
        document.querySelectorAll('.error-message').forEach(e => e.textContent = '');
    }

    function showAlert(message, type = 'danger') {
        alertBox.textContent = message;
        alertBox.className = `alert alert-${type}`;
        alertBox.style.display = 'flex';
    }

    function showLogin() {
        clearAuthErrors();
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('registerTab').classList.remove('active');
        document.getElementById('authSubtitle').textContent = 'Sign in with your created account.';
    }

    function showRegister() {
        clearAuthErrors();
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('registerTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('authSubtitle').textContent = 'Create an account once, then login from mobile or laptop.';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAuthErrors();

        const username = document.getElementById('loginUsername').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');

        if (!username) { document.getElementById('loginUsernameError').textContent = 'Username is required'; return; }
        if (!password) { document.getElementById('loginPasswordError').textContent = 'Password is required'; return; }

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';

        try {
            const data = await API.post('/auth/login', { username, password });
            Auth.setSession(data);
            window.location.href = '/dashboard.html';
        } catch (err) {
            showAlert('⚠️ ' + err.message);
            btn.disabled = false;
            btn.innerHTML = '🔐 Sign In';
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAuthErrors();

        const fullName = document.getElementById('fullName').value.trim();
        const username = document.getElementById('registerUsername').value.trim().toLowerCase();
        const password = document.getElementById('registerPassword').value;
        const btn = document.getElementById('registerBtn');

        if (!fullName) { document.getElementById('fullNameError').textContent = 'Full name is required'; return; }
        if (!username) { document.getElementById('registerUsernameError').textContent = 'Username is required'; return; }
        if (username.length < 3) { document.getElementById('registerUsernameError').textContent = 'Username must be at least 3 characters'; return; }
        if (!password) { document.getElementById('registerPasswordError').textContent = 'Password is required'; return; }
        if (password.length < 6) { document.getElementById('registerPasswordError').textContent = 'Password must be at least 6 characters'; return; }

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';

        try {
            const data = await API.post('/auth/register', { fullName, username, password });
            Auth.setSession(data);
            window.location.href = '/dashboard.html';
        } catch (err) {
            showAlert('⚠️ ' + err.message);
            btn.disabled = false;
            btn.innerHTML = '👤 Create Account';
        }
    });
</script>
<script src="/js/pwa.js"></script>
</body>
</html>
